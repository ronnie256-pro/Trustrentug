<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TRUST</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --sidebar-width: 260px;
        }
        body {
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: var(--sidebar-width);
            background-color: var(--color-emerald-darkest);
            color: white;
            position: fixed;
            top: 0; bottom: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .sidebar-brand {
            padding: 2rem;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--color-gold);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.85rem 2rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            gap: 1rem;
            font-size: 0.95rem;
        }
        .nav-item:hover, .nav-item.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .nav-item.active {
            border-left: 4px solid var(--color-gold);
            color: var(--color-gold);
        }
        .sidebar-footer {
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .admin-main {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - var(--sidebar-width));
        }
        .admin-topbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            position: sticky;
            top: 0;
            z-index: 900;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--color-emerald-dark);
            cursor: pointer;
        }
        .admin-content {
            padding: 3rem;
        }
        
        /* Mobile Breakpoint */
        @media (max-width: 992px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-main {
                margin-left: 0;
                width: 100%;
            }
            .hamburger {
                display: block;
            }
            .admin-topbar {
                padding: 0 1.5rem;
            }
            .admin-content {
                padding: 1.5rem;
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-shield-halved"></i> TRUST
        </div>
        <nav class="sidebar-nav">
            <a href="/admin-dashboard/" class="nav-item active">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-house-chimney"></i> Properties
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-users"></i> Tenants
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-credit-card"></i> Payments
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-screwdriver-wrench"></i> Maintenance
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-line"></i> Reports
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-file-contract"></i> Leases
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gears"></i> Settings
            </a>
        </nav>
        <div class="sidebar-footer">
            <form action="/logout/" method="post">
                {% csrf_token %}
                <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer; text-align: left;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <button class="hamburger" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 500;">Admin User</span>
                <div style="width: 40px; height: 40px; background: var(--color-emerald); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">A</div>
            </div>
        </header>
        <div class="admin-content">
            {% block admin_content %}{% endblock %}
        </div>
    </main>
    
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
